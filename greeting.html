<!DOCTYPE html>
<!-- Объявляем тип документа — HTML5 -->
<html lang="ru">
<!-- Открываем корневой элемент страницы, указываем язык — русский -->

<head>
    <!-- Head содержит метаданные страницы (не отображаются в контенте) -->
    <meta charset="UTF-8">
    <!-- Устанавливаем кодировку UTF-8 для поддержки русских символов -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Настраиваем viewport для корректного отображения на мобильных устройствах -->
    <title>Персональное приветствие</title>
    <!-- Заголовок страницы (отображается во вкладке браузера) -->
    <style>
        /* Блок стилей CSS для оформления элементов */
        body {
            /* Стили для всего тела страницы */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Шрифт — Segoe UI с запасными вариантами */
            margin: 0;
            /* Убираем стандартные отступы браузера */
            padding: 0;
            /* Убираем внутренние отступы */
            min-height: 100vh;
            /* Минимальная высота — 100% высоты экрана */
            display: flex;
            /* Включаем гибкую раскладку (Flexbox) */
            justify-content: center;
            /* Центрируем содержимое по горизонтали */
            align-items: center;
            /* Центрируем содержимое по вертикали */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            /* Градиентный фон: от фиолетово-синего к пурпурному */
        }
        .container {
            /* Класс для контейнера с контентом */
            background: white;
            /* Белый фон контейнера */
            padding: 40px;
            /* Внутренние отступы — 40 пикселей со всех сторон */
            border-radius: 20px;
            /* Закруглённые углы — 20 пикселей */
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            /* Тень контейнера: размытие 10px по Y, 40px размытие, полупрозрачный чёрный */
            text-align: center;
            /* Центрируем текст внутри контейнера */
            max-width: 400px;
            /* Максимальная ширина контейнера — 400 пикселей */
        }
        h1 {
            /* Стили для заголовка первого уровня */
            color: #333;
            /* Тёмно-серый цвет текста */
            margin-bottom: 20px;
            /* Нижний отступ — 20 пикселей */
            font-size: 2rem;
            /* Размер шрифта — 2rem (примерно 32px) */
        }
        .greeting {
            /* Класс для блока приветствия */
            font-size: 1.5rem;
            /* Размер шрифта — 1.5rem (примерно 24px) */
            color: #667eea;
            /* Фиолетовый цвет текста */
            font-weight: bold;
            /* Жирное начертание шрифта */
            margin: 30px 0;
            /* Отступы сверху и снизу — 30px, слева и справа — 0 */
            padding: 20px;
            /* Внутренние отступы — 20 пикселей */
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            /* Градиентный фон для блока приветствия */
            border-radius: 10px;
            /* Закруглённые углы — 10 пикселей */
        }
        .btn {
            /* Класс для кнопки */
            padding: 12px 30px;
            /* Внутренние отступы: 12px сверху/снизу, 30px слева/справа */
            background: linear-gradient(135deg, #667eea, #764ba2);
            /* Градиентный фон кнопки */
            color: white;
            /* Белый цвет текста */
            border: none;
            /* Убираем рамку */
            border-radius: 25px;
            /* Закруглённые углы — 25 пикселей */
            font-size: 16px;
            /* Размер шрифта — 16 пикселей */
            cursor: pointer;
            /* Курсор в виде руки при наведении */
            transition: all 0.3s ease;
            /* Плавная анимация всех изменений за 0.3 секунды */
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            /* Тень кнопки с фиолетовым оттенком */
        }
        .btn:hover {
            /* Эффект при наведении на кнопку */
            transform: translateY(-3px);
            /* Кнопка приподнимается на 3 пикселя */
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
            /* Тень становится больше и интенсивнее */
        }
        .emoji {
            /* Класс для эмодзи */
            font-size: 3rem;
            /* Размер эмодзи — 3rem (примерно 48px) */
            margin-bottom: 20px;
            /* Нижний отступ — 20 пикселей */
            display: block;
            /* Делаем элемент блочным для центрирования */
        }
    </style>
</head>

<body>
    <!-- Body содержит видимый контент страницы -->

    <div class="container">
        <!-- Контейнер для центрирования контента с белым фоном и тенью -->
        <span class="emoji">👋</span>
        <!-- Эмодзи приветствия (машущая рука) -->

        <h1>Добро пожаловать!</h1>
        <!-- Заголовок страницы -->

        <div id="greeting-block" class="greeting">
            <!-- Блок для отображения персонального приветствия -->
            Загрузка...
            <!-- Временный текст до выполнения скрипта -->
        </div>

        <button class="btn" onclick="askName()">Ввести имя заново</button>
        <!-- Кнопка для повторного ввода имени -->
    </div>

    <script>
        // Блок JavaScript для добавления интерактивности

        function askName() {
            // Объявляем функцию askName для запроса имени у пользователя
            const name = prompt('Как тебя зовут?', '');
            // Вызываем диалоговое окно prompt с вопросом и пустым значением по умолчанию
            // Результат сохраняется в переменную name (строка или null)

            const greetingBlock = document.getElementById('greeting-block');
            // Находим элемент с id="greeting-block" в DOM-дереве для обновления приветствия

            if (name === null || name.trim() === '') {
                // Проверяем: если пользователь нажал "Отмена" (null) или ввёл пустую строку
                // trim() удаляет пробелы по краям строки
                greetingBlock.textContent = 'Привет, незнакомец!';
                // Показывем стандартное приветствие для незнакомца
            } else {
                // Если имя было введено
                const capitalizedName = name.charAt(0).toUpperCase() + name.slice(1).toLowerCase();
                // Приводим имя к правильному виду: первая буква заглавная, остальные строчные
                // charAt(0) — первый символ, toUpperCase() — делаем заглавной
                // slice(1) — всё кроме первого символа, toLowerCase() — делаем строчными
                greetingBlock.textContent = `Привет, ${capitalizedName}!`;
                // Показываем персональное приветствие с именем (шаблонная строка)
            }
        }

        // Вызываем функцию askName сразу при загрузке страницы
        askName();
    </script>

</body>
<!-- Закрываем элемент body -->

</html>
<!-- Закрываем корневой элемент html -->
