<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кубок Гагарина 2026 — Мотивация Победителей</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial Black', 'Impact', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a2e 0%, #1a1a4e 25%, #2d1b4e 50%, #1a1a4e 75%, #0a0a2e 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            overflow-y: auto;
            position: relative;
            padding-top: 150px;
            padding-bottom: 50px;
            -webkit-overflow-scrolling: touch;
        }

        .click-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
            background: transparent;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 160px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 130px 80px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 160px 120px, #ffffff, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            animation: twinkle 5s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        .background-cup {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 500px;
            opacity: 0.15;
            z-index: 0;
            background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/e/e3/Gagarin_Cup.jpg/480px-Gagarin_Cup.jpg') no-repeat center center;
            background-size: contain;
        }

        .khl-logos {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 100px 20px 50px;
            box-sizing: border-box;
        }

        .khl-column {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
            min-width: 150px;
            pointer-events: none;
        }

        .khl-column-title {
            font-family: Arial Black, sans-serif;
            font-size: 16px;
            font-weight: bold;
            color: #ffd700;
            text-transform: uppercase;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
            text-align: center;
        }

        .khl-logo {
            font-family: Arial, sans-serif;
            font-size: 14px;
            font-weight: 400;
            color: #ffffff;
            text-transform: capitalize;
            opacity: 0.7;
            pointer-events: none;
            white-space: nowrap;
            text-align: center;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        .container {
            text-align: center;
            z-index: 10;
            padding: 20px;
            max-width: 900px;
            width: 100%;
            position: relative;
            background: rgba(10, 10, 46, 0.8);
            border-radius: 20px;
            margin-top: 20px;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            border: 2px solid #ffd700;
            pointer-events: auto;
            background-clip: padding-box;
        }

        .khl-logos {
            z-index: 1;
        }

        h1 {
            color: #ffd700;
            font-size: 2rem;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8), 0 0 40px rgba(255, 215, 0, 0.5);
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 3px;
            position: sticky;
            top: 0;
            background: rgba(10, 10, 46, 0.9);
            padding: 20px;
            border-radius: 15px;
            z-index: 20;
        }

        .phrase {
            color: #ffffff;
            font-size: 1.4rem;
            font-weight: 900;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
            padding: 20px 30px;
            margin: 15px auto;
            max-width: 800px;
            border: 3px solid #ffd700;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.6);
            opacity: 0;
            transform: scale(0.8) translateY(50px);
            transition: all 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            position: relative;
            pointer-events: auto;
        }

        .phrase.visible {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .fireworks {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            pointer-events: none;
        }

        .running-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(90deg, #0a0a2e, #1a1a4e, #0a0a2e);
            color: #ffd700;
            font-size: 1.1rem;
            font-weight: bold;
            font-family: Arial, sans-serif;
            padding: 12px 0;
            z-index: 1000;
            box-shadow: 0 2px 10px rgba(255, 215, 0, 0.3);
            overflow: hidden;
            border-bottom: 2px solid #ffd700;
            pointer-events: none;
        }

        .running-line-content {
            display: inline-block;
            font-size: 1.2rem;
            white-space: nowrap;
            animation: marquee 30s linear infinite;
            color: #ffffff;
            font-weight: bold;
            pointer-events: none;
        }

        #countdown {
            color: #ffd700;
            font-weight: bold;
        }

        @keyframes marquee {
            0% {
                margin-left: 100%;
            }
            100% {
                margin-left: -100%;
            }
        }

        .click-hint {
            position: fixed;
            bottom: 30px;
            color: rgba(255, 215, 0, 0.8);
            font-size: 1rem;
            font-family: Arial, sans-serif;
            animation: pulse 2s infinite;
            z-index: 100;
            pointer-events: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        @keyframes firework {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <div class="click-overlay" id="clickOverlay"></div>
    <div class="stars"></div>
    
    <div class="running-line">
        <div class="running-line-content" id="runningText">
            ⏳ До начала плей-офф осталось: <span id="countdown">загрузка...</span> ⏳
        </div>
    </div>

    <div class="khl-logos" id="khlLogos"></div>

    <div class="background-cup"></div>
    
    <div class="container">
        <h1>🏆 Кубок Гагарина 2026 🏆</h1>
        
        <div class="phrase" id="phrase1">
            🔥 ТВОЯ МЕЧТА СТАНЕТ РЕАЛЬНОСТЬЮ! 🔥
        </div>
        
        <div class="phrase" id="phrase2">
            ⭐ ЧЕМПИОНАМИ РОЖДАЮТСЯ В БОРЬБЕ! ⭐
        </div>
        
        <div class="phrase" id="phrase3">
            🏆 КУБОК ЖДЁТ ТОЛЬКО ТЕХ, КТО ВЕРИТ! 🏆
        </div>
        
        <div class="phrase" id="phrase4">
            💪 СИЛЬНЕЕ, БЫСТРЕЕ, ВЫШЕ — К ПОБЕДЕ! 💪
        </div>
        
        <div class="phrase" id="phrase5">
            🎯 2026 — ТВОЙ ГОД ТРИУМФА! 🎯
        </div>
    </div>

    <div class="click-hint">Нажми на экран, чтобы увидеть мотивацию</div>

    <script>
        let currentIndex = 0;
        const phrases = document.querySelectorAll('.phrase');
        const totalPhrases = phrases.length;

        // Клубы КХЛ 2025/2026 по конференциям
        const khlWest = [
            'CSKA',
            'SKA',
            'Dynamo Moscow',
            'Spartak',
            'Lokomotiv',
            'Torpedo NN',
            'Severstal',
            'Sochi',
            'Dynamo Minsk',
            'Shanghai Dragons',
            'Lada'
        ];

        const khlEast = [
            'Ak Bars',
            'Metallurg Mg',
            'Avangard',
            'Salavat Yulaev',
            'Traktor',
            'Sibir',
            'Admiral',
            'Amur',
            'Barys',
            'Neftekhimik',
            'Avtomobilist'
        ];

        // Добавляем клубы КХЛ двумя колонками (Запад и Восток)
        const khlLogosContainer = document.getElementById('khlLogos');

        // Западная конференция
        const westColumn = document.createElement('div');
        westColumn.className = 'khl-column';
        
        const westTitle = document.createElement('div');
        westTitle.className = 'khl-column-title';
        westTitle.textContent = 'WEST';
        westColumn.appendChild(westTitle);
        
        khlWest.forEach((team, index) => {
            const logo = document.createElement('div');
            logo.className = 'khl-logo';
            logo.textContent = team;
            westColumn.appendChild(logo);
        });

        // Восточная конференция
        const eastColumn = document.createElement('div');
        eastColumn.className = 'khl-column';
        
        const eastTitle = document.createElement('div');
        eastTitle.className = 'khl-column-title';
        eastTitle.textContent = 'EAST';
        eastColumn.appendChild(eastTitle);
        
        khlEast.forEach((team, index) => {
            const logo = document.createElement('div');
            logo.className = 'khl-logo';
            logo.textContent = team;
            eastColumn.appendChild(logo);
        });

        khlLogosContainer.appendChild(westColumn);
        khlLogosContainer.appendChild(eastColumn);

        // Обратный отсчёт до плей-офф
        const playoffDate = new Date('March 23, 2026 00:00:00').getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = playoffDate - now;

            const runningText = document.getElementById('runningText');
            const countdownEl = document.getElementById('countdown');

            if (distance < 0) {
                // Плей-офф начался
                runningText.innerHTML = '🏆 Скоро мы узнаем НОВОГО ЧЕМПИОНА! 🏆';
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            countdownEl.textContent = `${days} дн. ${hours} ч. ${minutes} мин. ${seconds} сек.`;
            countdownEl.style.display = 'inline';
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();

        function createFirework(x, y) {
            const colors = ['#ffd700', '#ffffff', '#ffd700', '#ffffff', '#ffd700', '#ffffff'];

            for (let i = 0; i < 30; i++) {
                const firework = document.createElement('div');
                firework.className = 'fireworks';
                firework.style.left = x + 'px';
                firework.style.top = y + 'px';
                firework.style.background = colors[Math.floor(Math.random() * colors.length)];

                const angle = (Math.PI * 2 * i) / 30;
                const velocity = 100 + Math.random() * 100;
                const tx = Math.cos(angle) * velocity + 'px';
                const ty = Math.sin(angle) * velocity + 'px';

                firework.style.setProperty('--tx', tx);
                firework.style.setProperty('--ty', ty);
                firework.style.animation = `firework 1s ease-out forwards`;

                document.body.appendChild(firework);

                setTimeout(() => firework.remove(), 1000);
            }
        }

        function showNextPhrase(event) {
            if (currentIndex < totalPhrases) {
                phrases[currentIndex].classList.add('visible');
                
                const x = event.clientX || window.innerWidth / 2;
                const y = event.clientY || window.innerHeight / 2;
                createFirework(x, y);
                
                currentIndex++;

                if (currentIndex === totalPhrases) {
                    document.querySelector('.click-hint').textContent = 'Все фразы показаны! Обнови страницу';
                }
            }
        }

        // Обработка кликов в любом месте страницы
        document.addEventListener('click', showNextPhrase);

        // Показать первую фразу при загрузке
        setTimeout(() => {
            phrases[0].classList.add('visible');
            currentIndex = 1;
        }, 500);
    </script>
</body>

</html>
